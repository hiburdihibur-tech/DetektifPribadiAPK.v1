name: Build APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Dependencies
        run: |
          sudo apt update

          sudo apt install -y \
          git zip unzip \
          openjdk-17-jdk \
          autoconf automake libtool pkg-config \
          libffi-dev \
          libssl-dev \
          zlib1g-dev \
          python3-pip \
          python3-setuptools \
          python3-wheel \
          ccache

          python -m pip install --upgrade pip

          pip install Cython==0.29.36

          pip install buildozer==1.5.0

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DetektifPribadiAPK
          path: bin/*.apk
