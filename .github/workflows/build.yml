name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Buildozer
        run: |
          sudo apt update
          sudo apt install -y zip unzip git python3-pip python3-setuptools python3-wheel build-essential ccache libffi-dev libssl-dev libsqlite3-dev libjpeg-dev zlib1g-dev openjdk-17-jdk autopoint gettext autoconf automake libtool pkg-config
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        run: |
          yes | sdkmanager --licenses || true
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DetektifPribadiAPK
          path: bin/*.apk
